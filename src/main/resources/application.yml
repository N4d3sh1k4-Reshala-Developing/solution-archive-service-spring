server:
  port: 8185

spring:
  cloud:
    config:
      enabled: false
  application:
    name: solution-archive-service
  datasource:
    url: jdbc:postgresql://localhost:5430/suluton_archive_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: solution-user
    password: solutionpass
    virtual-host: solution-service

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-user:zvBGTYdMUJV7mpRs35YA@localhost:8761/eureka/

  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}

minio:
  url: http://localhost:9000
  access-key: admin
  secret-key: password123
  temp-bucket: temp-images
  dataset-bucket: dataset-images

latexocr:
  url: http://localhost:8183

casengine:
  url: http://localhost:8184
